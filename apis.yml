name: Marketstack
description: >-
  Marketstack is a real-time, intraday, and historical stock market data API
  from APILayer, delivering JSON data for tickers across 70+ global stock
  exchanges. The REST API covers end-of-day and intraday prices, real-time
  stock prices, splits, dividends, commodities, company ratings, market
  indexes, bonds, ETF holdings, currencies, timezones, and SEC EDGAR company
  filings and facts, all authenticated with a simple access_key query
  parameter.
