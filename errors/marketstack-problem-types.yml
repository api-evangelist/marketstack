envelope: >-
  Errors return an HTTP status code and a JSON body {"error": {"code":
  "<string>", "message": "<string>"}}. Validation errors add a "context"
  object with one sub-object per affected parameter carrying key and message
  fields. Successful requests return HTTP 200. (Note: the legacy v1 error
  envelope used numeric codes plus a "type" field, e.g. {"code": 101, "type":
  "missing_access_key"}; v2 returns the string code directly - both shapes
  were observed live on 2026-07-22.)
